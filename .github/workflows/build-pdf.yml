name: Build and Release PDF Book

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger release when pushing tags like v1.0.0
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-extra-utils texlive-latex-extra

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: '3.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Cache Remote Assets
        uses: actions/cache@v4
        with:
          path: .cache/images
          key: ${{ runner.os }}-assets-${{ hashFiles('metadata.yml', 'chapters/**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-assets-

      - name: Install Chromium for Mermaid
        run: sudo apt-get install -y chromium-browser

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build PDF
        run: ./build.sh
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Upload PDF as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Book-PDF
          path: output/book.pdf

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/book.pdf
          generate_release_notes: true
