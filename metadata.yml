title: "My Awesome Book"
author: "Author Name"
date: "2024"

# Eisvogel specific properties
book: true
graphics: true
classoption:
  - oneside
  - open=any

# Cover Page Settings
titlepage: false

# Page Background (Optional)
# page-background: "assets/images/background.png"
# page-background-opacity: 0.2

# Headers & Footers
header-left: "Book Title"
# header-center: ""
# header-right: ""
footer-left: "Author Name"
# footer-center: ""
# footer-right: "" # Defaults to page number if left commented out

# Table of Contents
# We set toc to false because we place it manually in meta/toc.md
toc: false
toc-own-page: true

# Styling
colorlinks: true
linkcolor: "blue"
geometry:
  - top=30mm
  - left=20mm
  - right=20mm
  - bottom=30mm

header-includes:
  - \usepackage{float}
  - \usepackage{wrapfig}
  - \floatplacement{figure}{H}
  - \renewcommand\maketitle{} # Suppress default Pandoc title page
